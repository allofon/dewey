<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Dewey Träningsverktyg</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Dewey Träningsverktyg</h1>

<div class="card" id="exerciseCard"></div>

<div class="card">
  <h3>Hierarkisk klassificering</h3>
  <div id="selectors"></div>
  <p><strong>Ditt nummer:</strong> <span id="selectedNumber">Inget valt</span></p>
  <button id="checkBtn">Kontrollera</button>
  <button id="nextBtn">Nästa övning</button>
  <button id="expandBtn">Utveckla koden</button>
  <p>Utbyggd kod: <span id="expandedNumber">Inget valt</span></p>
  <div id="feedback" class="feedback"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
